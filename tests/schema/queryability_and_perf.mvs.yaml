name: queryability_and_performance
description: "AC6: queryability smoke (SELECT * LIMIT 0 on all 118 objects + 4 tier queries). AC10: partition/cluster pruning\
  \ perf."
connections:
  target:
    engine: bigquery
migration:
  steps:
  - kind: ddl
    sql: "ddl/02-staging.sql"
  - kind: ddl
    sql: "ddl/03-ods.sql"
  - kind: ddl
    sql: "ddl/04-dm-tables.sql"
  - kind: ddl
    sql: "ddl/05-dm-views.sql"
  - kind: ddl
    sql: "ddl/06-etl-control.sql"
