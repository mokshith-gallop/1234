name: ods_schema_conformance
description: "Schema conformance for ODS layer — 30 tables, all columns, partition/cluster."
connections:
  source:
    engine: impala
  target:
    engine: bigquery
source_setup:
  location_base: "${SOURCE_WAREHOUSE:-/tmp/dmt_src}"
  ddl:
  - "sql/legacy/01-create-databases.hql"
  - "sql/legacy/03-ods.hql"
migration:
  steps:
  - kind: ddl
    sql: "ddl/03-ods.sql"
suites:
- pattern: schema_conformance
  id: "ods-schema"
  story_id: "NBCS-TARGET-SCHEMA"
  target_dataset: "${BUILD_DATASET}"
  source_database: ods
  expect_table_count: 30
  tables:
  - table: ods_program
    source_table: ods_program
    expect_object_type: TABLE
    columns:
    - name: program_id
      type: INT64
      source_type: BIGINT
    - name: client_id
      type: INT64
      source_type: BIGINT
    - name: program_code
      type: STRING
      source_type: STRING
    - name: program_name
      type: STRING
      source_type: STRING
    - name: line_of_business
      type: STRING
      source_type: STRING
    - name: channel_mix
      type: STRING
      source_type: STRING
    - name: site_code
      type: STRING
      source_type: STRING
    - name: status
      type: STRING
      source_type: STRING
    - name: go_live_ts
      type: TIMESTAMP
      source_type: TIMESTAMP
    - name: updated_ts
      type: TIMESTAMP
      source_type: TIMESTAMP
    - name: snapshot_date
      type: DATE
      source_type: STRING
    partition_by: snapshot_date
