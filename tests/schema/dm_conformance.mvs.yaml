name: dm_schema_conformance
description: Schema conformance for DM layer — 25 tables + 15 views.
connections:
  source:
    engine: impala
  target:
    engine: bigquery
source_setup:
  location_base: "${SOURCE_WAREHOUSE:-/tmp/dmt_src}"
  ddl:
  - "sql/legacy/01-create-databases.hql"
  - "sql/legacy/04-dm-tables.hql"
migration:
  steps:
  - kind: ddl
    sql: "ddl/04-dm-tables.sql"
  - kind: ddl
    sql: "ddl/05-dm-views.sql"
suites:
- pattern: schema_conformance
  id: "dm-schema"
  story_id: "NBCS-TARGET-SCHEMA"
  target_dataset: "${BUILD_DATASET}"
  source_database: dm
  expect_table_count: 40
  tables:
  - table: dim_date
    source_table: dim_date
    expect_object_type: TABLE
    columns:
